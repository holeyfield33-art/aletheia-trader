version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt &&
      uvicorn api.server:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt &&
      streamlit run dashboard/app_enhanced.py --server.port=8501"
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
